<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkiSafe — Model Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --snow: #f0f4f8;
    --ice: #dceefb;
    --glacier: #a8d5f5;
    --sky: #2d7dd2;
    --deep-sky: #1a4f8a;
    --night: #0a1628;
    --midnight: #060e1c;
    --pine: #1a3a2a;
    --alert: #ff4757;
    --warn: #ffa502;
    --good: #2ed573;
    --accent: #00d4ff;
    --text: #e8f0fe;
    --muted: #7a9cc5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--midnight);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .mountain-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 40%, #0a1628 100%);
    overflow: hidden;
  }

  .mountain-bg::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(180deg, transparent, #0d2a1a 100%);
    clip-path: polygon(0% 60%, 15% 20%, 28% 45%, 40% 5%, 55% 35%, 68% 10%, 80% 40%, 92% 15%, 100% 30%, 100% 100%, 0% 100%);
    opacity: 0.4;
  }

  .mountain-bg::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(180deg, rgba(240,244,248,0.06), rgba(240,244,248,0.15));
    clip-path: polygon(0% 70%, 20% 30%, 35% 55%, 50% 15%, 65% 45%, 78% 20%, 90% 50%, 100% 25%, 100% 100%, 0% 100%);
  }

  .stars {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60%;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 20%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 5%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 10%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 42%, rgba(255,255,255,0.5) 0%, transparent 100%);
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  header {
    display: flex;
    align-items: flex-end;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(0,212,255,0.2);
  }

  .logo-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    line-height: 1;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 0 0 40px rgba(0,212,255,0.4);
  }

  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .logo-desc { font-size: 0.85rem; color: var(--muted); font-weight: 300; }

  .input-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    backdrop-filter: blur(10px);
  }

  .input-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    display: block;
  }

  textarea {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--glacier);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 1rem;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: rgba(0,212,255,0.4); }
  textarea::placeholder { color: rgba(122,156,197,0.4); }

  .btn {
    margin-top: 1rem;
    background: var(--sky);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.7rem 2rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(45,125,210,0.3);
  }

  .btn:hover {
    background: var(--accent);
    box-shadow: 0 4px 30px rgba(0,212,255,0.4);
    transform: translateY(-1px);
  }

  .error {
    color: var(--alert);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    margin-top: 0.5rem;
    display: none;
  }

  #dashboard { display: none; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--snow);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,212,255,0.3), transparent);
  }

  .tag {
    font-size: 0.6rem;
    letter-spacing: 2px;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    text-transform: uppercase;
  }

  .tag-int8 { background: rgba(0,212,255,0.15); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .metric-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .metric-card:hover { transform: translateY(-2px); border-color: rgba(0,212,255,0.25); }
  .metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .metric-card.good::before { background: var(--good); }
  .metric-card.warn::before { background: var(--warn); }
  .metric-card.bad::before { background: var(--alert); }

  .metric-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .metric-value { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; line-height: 1; margin-bottom: 0.25rem; }
  .metric-card.good .metric-value { color: var(--good); }
  .metric-card.warn .metric-value { color: var(--warn); }
  .metric-card.bad .metric-value { color: var(--alert); }
  .metric-sub { font-size: 0.75rem; color: var(--muted); font-weight: 300; }

  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

  .matrix-wrap {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .matrix-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .matrix-grid {
    display: grid;
    grid-template-columns: auto 1fr 1fr;
    grid-template-rows: auto 1fr 1fr;
    gap: 4px;
  }

  .matrix-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    padding: 0.4rem;
    letter-spacing: 1px;
  }

  .matrix-row-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    padding-right: 0.6rem;
    letter-spacing: 1px;
  }

  .matrix-cell { border-radius: 8px; padding: 0.75rem; text-align: center; }
  .matrix-cell .cell-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; line-height: 1; display: block; }
  .matrix-cell .cell-label { font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; margin-top: 0.2rem; }

  .cell-tp { background: rgba(46,213,115,0.2); border: 1px solid rgba(46,213,115,0.3); color: var(--good); }
  .cell-tn { background: rgba(46,213,115,0.08); border: 1px solid rgba(46,213,115,0.15); color: rgba(46,213,115,0.7); }
  .cell-fp { background: rgba(255,165,2,0.15); border: 1px solid rgba(255,165,2,0.3); color: var(--warn); }
  .cell-fn { background: rgba(255,71,87,0.2); border: 1px solid rgba(255,71,87,0.4); color: var(--alert); }

  .goal-bar-wrap {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }

  .goal-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
  .goal-name { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .goal-pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; }
  .bar-track { background: rgba(255,255,255,0.06); border-radius: 999px; height: 8px; overflow: hidden; margin-bottom: 0.4rem; }
  .bar-fill { height: 100%; border-radius: 999px; }
  .bar-fill.good { background: linear-gradient(90deg, var(--good), #00ff88); }
  .bar-fill.warn { background: linear-gradient(90deg, var(--warn), #ffcc02); }
  .bar-fill.bad { background: linear-gradient(90deg, var(--alert), #ff6b81); }
  .goal-target { font-size: 0.7rem; color: var(--muted); font-weight: 300; }
  .goal-item { margin-bottom: 1.25rem; }
  .goal-item:last-child { margin-bottom: 0; }

  .insight {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .insight-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .insight ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .insight li { font-size: 0.85rem; color: var(--text); font-weight: 300; padding-left: 1.25rem; position: relative; line-height: 1.5; }
  .insight li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 0.7rem; top: 0.15rem; }

  .snow-divider { text-align: center; color: rgba(0,212,255,0.2); font-size: 1.2rem; letter-spacing: 1rem; margin: 1.5rem 0; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.5s ease forwards; opacity: 0; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }

  @media (max-width: 600px) {
    .metrics-grid { grid-template-columns: 1fr; }
    .split { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; }
    .logo-mark { font-size: 3rem; }
  }
</style>
</head>
<body>
<div class="mountain-bg"><div class="stars"></div></div>

<div class="wrap">
  <header>
    <div class="logo-mark">⛷ SkiSafe</div>
    <div>
      <div class="logo-sub">TinyML Model Dashboard</div>
      <div class="logo-desc">Edge Impulse · Human Detection · On-Helmet Inference</div>
    </div>
  </header>

  <div class="input-section">
    <span class="input-label">📋 Paste Edge Impulse JSON Results</span>
    <textarea id="jsonInput" placeholder="Paste your Edge Impulse model testing JSON here..."></textarea>
    <div class="error" id="errorMsg">⚠ Invalid JSON — double check what you pasted</div>
    <button class="btn" onclick="parseAndRender()">ANALYZE RESULTS ▶</button>
  </div>

  <div id="dashboard"></div>
</div>

<script>
function getColor(val, good, warn) {
  if (val >= good) return 'good';
  if (val >= warn) return 'warn';
  return 'bad';
}

function pct(val) { return (val * 100).toFixed(1) + '%'; }

function renderSet(data, label) {
  const nb = data.int8.non_background;
  const nb32 = data.float32.non_background;
  const cm = data.int8.confusion_matrix;
  const tn = cm[0][0], fp = cm[0][1], fn = cm[1][0], tp = cm[1][1];

  const rColor = getColor(nb.recall, 0.85, 0.65);
  const pColor = getColor(nb.precision, 0.75, 0.55);
  const fColor = getColor(nb.f1, 0.75, 0.60);

  const recallGapText = nb.recall >= 0.85
    ? '✓ Goal achieved!'
    : `${((0.85 - nb.recall)*100).toFixed(1)}pp away from 85% goal`;

  return `
    <div class="section-title fade-up">${label} <span class="tag tag-int8">INT8</span></div>

    <div class="metrics-grid fade-up delay-1">
      <div class="metric-card ${rColor}">
        <div class="metric-label">Recall</div>
        <div class="metric-value">${pct(nb.recall)}</div>
        <div class="metric-sub">${recallGapText}</div>
      </div>
      <div class="metric-card ${pColor}">
        <div class="metric-label">Precision</div>
        <div class="metric-value">${pct(nb.precision)}</div>
        <div class="metric-sub">Of all detections, how many are real</div>
      </div>
      <div class="metric-card ${fColor}">
        <div class="metric-label">F1 Score</div>
        <div class="metric-value">${pct(nb.f1)}</div>
        <div class="metric-sub">Harmonic mean of precision & recall</div>
      </div>
    </div>

    <div class="split fade-up delay-2">
      <div class="matrix-wrap">
        <div class="matrix-title">Confusion Matrix · INT8 · Human Class</div>
        <div class="matrix-grid">
          <div></div>
          <div class="matrix-header">Pred: BG</div>
          <div class="matrix-header">Pred: Human</div>
          <div class="matrix-row-header">BG</div>
          <div class="matrix-cell cell-tn">
            <span class="cell-val">${tn.toLocaleString()}</span>
            <span class="cell-label">True Neg ✓</span>
          </div>
          <div class="matrix-cell cell-fp">
            <span class="cell-val">${fp.toLocaleString()}</span>
            <span class="cell-label">False Pos</span>
          </div>
          <div class="matrix-row-header">Human</div>
          <div class="matrix-cell cell-fn">
            <span class="cell-val">${fn.toLocaleString()}</span>
            <span class="cell-label">False Neg ⚠</span>
          </div>
          <div class="matrix-cell cell-tp">
            <span class="cell-val">${tp.toLocaleString()}</span>
            <span class="cell-label">True Pos ✓</span>
          </div>
        </div>
      </div>

      <div class="goal-bar-wrap">
        <div class="matrix-title">Goal Progress</div>
        <div class="goal-item">
          <div class="goal-label">
            <span class="goal-name">Recall</span>
            <span class="goal-pct" style="color:var(--${rColor})">${pct(nb.recall)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${rColor}" style="width:${Math.min(nb.recall/0.85*100,100)}%"></div></div>
          <div class="goal-target">Target: 85%</div>
        </div>
        <div class="goal-item">
          <div class="goal-label">
            <span class="goal-name">Precision</span>
            <span class="goal-pct" style="color:var(--${pColor})">${pct(nb.precision)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${pColor}" style="width:${Math.min(nb.precision/0.75*100,100)}%"></div></div>
          <div class="goal-target">Target: 75%+</div>
        </div>
        <div class="goal-item">
          <div class="goal-label">
            <span class="goal-name">F1 Score</span>
            <span class="goal-pct" style="color:var(--${fColor})">${pct(nb.f1)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${fColor}" style="width:${Math.min(nb.f1/0.75*100,100)}%"></div></div>
          <div class="goal-target">Target: 75%+</div>
        </div>
      </div>
    </div>

    <div class="insight fade-up delay-3">
      <div class="insight-title">⚡ Quick Read · ${label}</div>
      <ul>
        <li>Missed <strong>${fn}</strong> real humans (False Negatives) — these are the dangerous misses for SkiSafe</li>
        <li>False alarmed <strong>${fp}</strong> times on empty background (False Positives)</li>
        <li>INT8 vs Float32 Recall gap: <strong>${Math.abs((nb.recall - nb32.recall)*100).toFixed(1)}pp</strong> — smaller is better for on-device performance</li>
        <li>Overall accuracy of ${pct(data.int8.classification_report.accuracy)} is misleading — class imbalance inflates it. Recall is what matters.</li>
      </ul>
    </div>
  `;
}

function parseAndRender() {
  const raw = document.getElementById('jsonInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  let data;
  try { data = JSON.parse(raw); }
  catch(e) { errEl.style.display = 'block'; return; }

  let html = '';

  if (data.validation) {
    html += renderSet(data.validation, '📊 Validation Set');
    if (data.test) html += '<div class="snow-divider">❄ ❄ ❄</div>';
  }

  if (data.test) {
    html += renderSet(data.test, '🎯 Test Set');
  }

  if (data.validation && data.test) {
    const vR = data.validation.int8.non_background.recall;
    const tR = data.test.int8.non_background.recall;
    const gap = ((vR - tR)*100).toFixed(1);
    const gapMsg = parseFloat(gap) > 15
      ? 'Large gap — model is overfitting. Needs label cleanup + more diverse training data.'
      : parseFloat(gap) > 8
      ? 'Moderate gap — label cleanup and more negatives should close this.'
      : 'Small gap — model is generalizing reasonably well.';

    html += `
      <div class="snow-divider">❄ ❄ ❄</div>
      <div class="insight fade-up" style="border-color:rgba(255,165,2,0.35);background:rgba(255,165,2,0.05)">
        <div class="insight-title" style="color:var(--warn)">⚠ Generalization Gap</div>
        <ul>
          <li>Validation Recall <strong>${pct(vR)}</strong> → Test Recall <strong>${pct(tR)}</strong> → Gap: <strong>${gap}pp</strong></li>
          <li>${gapMsg}</li>
          <li>Next steps: finish label audit → retrain → add ~700 negative samples → retrain again → retest</li>
        </ul>
      </div>
    `;
  }

  const dash = document.getElementById('dashboard');
  dash.innerHTML = html;
  dash.style.display = 'block';
  dash.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
